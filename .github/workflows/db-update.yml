# Update the Mobility Database Schema
name: Database Update
on:
  workflow_dispatch:
    inputs:
      DRY_RUN:
        description: Dry run. Skip applying schema and content updates
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      DRY_RUN:
        description: Dry run. Skip applying schema and content updates
        required: false
        default: true
        type: boolean
      PROJECT_ID:
        description: GCP Project ID (forwarded to child workflows)
        required: false
        type: string
      REGION:
        description: GCP region (forwarded to child workflows)
        required: false
        type: string
      DB_NAME:
        description: PostgreSQL Database Name (forwarded to child workflows)
        required: false
        type: string
      ENVIRONMENT:
        description: Environment label (forwarded to child workflows)
        required: false
        type: string
      DB_ENVIRONMENT:
        description: Environment where DB is deployed (forwarded to child workflows)
        required: false
        type: string
      API_BASE_URL:
        description: Base URL host for the API (not used by this wrapper, accepted for compatibility)
        required: false
        default: api.mobilitydatabase.org
        type: string
    secrets:
      DB_USER_PASSWORD:
        description: PostgreSQL User Password
        required: true
      DB_USER_NAME:
        description: PostgreSQL User Name
        required: true
      DB_INSTANCE_NAME:
        description: PostgreSQL Instance Name (forwarded as POSTGRE_SQL_INSTANCE_NAME)
        required: true
      GCP_MOBILITY_FEEDS_SA_KEY:
        description: Service account key for GCP (used by content workflow)
        required: true
      DB_GCP_MOBILITY_FEEDS_SA_KEY:
        description: Service account key for DB environment (used by schema/content)
        required: true
      OP_SERVICE_ACCOUNT_TOKEN:
        description: 1Password Service Account Token
        required: true
      OP_FEEDS_SERVICE_ACCOUNT_TOKEN:
        description: 1Password token for feeds secret (used by content workflow)
        required: true
      API_TEST_REFRESH_TOKEN:
        description: Optional API token (accepted for compatibility)
        required: false

jobs:
  print-event-name:
    name: Print event name
    runs-on: ubuntu-latest
    steps:
      - name: Print event and inputs
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "inputs.DRY_RUN=${{ inputs.DRY_RUN }}"
          echo "inputs.INSTALL_LATEST=${{ inputs.INSTALL_LATEST }}"
          echo "inputs.CHECKOUT_REF=${{ inputs.CHECKOUT_REF }}"

  db-update-schema:
    name: Call DB schema update
    uses: ./.github/workflows/db-update-schema.yml
    with:
      PROJECT_ID: ${{ vars.QA_MOBILITY_FEEDS_PROJECT_ID }}
      REGION: ${{ vars.MOBILITY_FEEDS_REGION }}
      DB_NAME: ${{ vars.QA_POSTGRE_SQL_DB_NAME }}
      DB_ENVIRONMENT: ${{ vars.QA_MOBILITY_FEEDS_ENVIRONMENT }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.DRY_RUN }}
    secrets:
      DB_USER_PASSWORD: ${{ secrets.QA_POSTGRE_USER_PASSWORD }}
      DB_USER_NAME: ${{ secrets.QA_POSTGRE_USER_NAME }}
      DB_GCP_MOBILITY_FEEDS_SA_KEY: ${{ secrets.QA_GCP_MOBILITY_FEEDS_SA_KEY }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      POSTGRE_SQL_INSTANCE_NAME: ${{ secrets.DB_INSTANCE_NAME }}

  db-update-content:
    name: Call DB content update
    needs: [ db-update-schema ]
    uses: ./.github/workflows/db-update-content.yml
    with:
      PROJECT_ID: ${{ vars.QA_MOBILITY_FEEDS_PROJECT_ID }}
      REGION: ${{ vars.MOBILITY_FEEDS_REGION }}
      DB_NAME: ${{ vars.QA_POSTGRE_SQL_DB_NAME }}
      ENVIRONMENT: ${{ vars.QA_MOBILITY_FEEDS_ENVIRONMENT }}
      DB_ENVIRONMENT: ${{ vars.QA_MOBILITY_FEEDS_ENVIRONMENT }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.DRY_RUN }}
      CHECKOUT_REF: main
    secrets:
      DB_USER_PASSWORD: ${{ secrets.QA_POSTGRE_USER_PASSWORD }}
      DB_USER_NAME: ${{ secrets.QA_POSTGRE_USER_NAME }}
      GCP_MOBILITY_FEEDS_SA_KEY: ${{ secrets.QA_GCP_MOBILITY_FEEDS_SA_KEY }}
      DB_GCP_MOBILITY_FEEDS_SA_KEY: ${{ secrets.QA_GCP_MOBILITY_FEEDS_SA_KEY }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      OP_FEEDS_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_FEEDS_SERVICE_ACCOUNT_TOKEN }}
      POSTGRE_SQL_INSTANCE_NAME: ${{ secrets.DB_INSTANCE_NAME }}

[databases]
MobilityDatabase = host=postgres port=5432 dbname=MobilityDatabase user=postgres password=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres
pool_mode = session
max_client_conn = 100
default_pool_size = 20